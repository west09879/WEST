<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — BeFo Bakers</title>
  <base href="/">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#FFF9F0 0%,#F9E6D8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:white;border-radius:28px;max-width:420px;width:100%;overflow:hidden;box-shadow:0 30px 60px rgba(139,69,19,.15);animation:appear .7s ease}
    @keyframes appear{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
    .top{background:linear-gradient(135deg,#C17B4B,#8B4513);padding:36px;text-align:center;color:white}
    .top i{font-size:44px;background:rgba(255,255,255,.18);width:74px;height:74px;line-height:74px;border-radius:50%;display:inline-block;border:3px solid rgba(255,255,255,.3);margin-bottom:12px}
    .top h2{font-family:'Playfair Display',serif;font-size:1.9rem;margin-bottom:4px}
    .top p{opacity:.88;font-size:.9rem}
    .body{padding:36px}
    .fg{margin-bottom:22px}
    .fg label{display:block;margin-bottom:7px;font-weight:500;color:#2C1810;font-size:.92rem}
    .iw{position:relative}
    .iw i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#C17B4B;font-size:16px}
    .fg input{width:100%;padding:14px 14px 14px 44px;border:2px solid rgba(193,123,75,.15);border-radius:14px;font-size:1rem;font-family:'Poppins',sans-serif;transition:.3s;color:#2C1810}
    .fg input:focus{outline:none;border-color:#C17B4B;box-shadow:0 0 0 4px rgba(193,123,75,.1)}
    .pw-bar{height:4px;background:#eee;border-radius:2px;overflow:hidden;margin-top:7px}
    .pw-fill{height:100%;width:0;transition:.3s}
    .pw-txt{font-size:11px;margin-top:4px;color:#888}
    .btn{width:100%;padding:15px;background:linear-gradient(135deg,#D4AF37,#C17B4B);color:white;border:none;border-radius:14px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:.3s;text-transform:uppercase;letter-spacing:1px;font-family:'Poppins',sans-serif;margin-top:4px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(193,123,75,.35)}
    .btn.loading{color:transparent;pointer-events:none}
    .btn.loading::after{content:'';position:absolute;width:22px;height:22px;top:50%;left:50%;margin:-11px 0 0 -11px;border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:white;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg{margin-bottom:18px}
    .alert{padding:13px 16px;border-radius:12px;font-size:.9rem;display:flex;align-items:center;gap:10px}
    .alert-error{background:#fee;color:#c0392b;border-left:4px solid #c0392b}
    .alert-success{background:#e8f5e9;color:#27ae60;border-left:4px solid #27ae60}
    .back{text-align:center;margin-top:20px}
    .back a{color:#C17B4B;text-decoration:none;font-size:.9rem;display:inline-flex;align-items:center;gap:5px}
    .back a:hover{text-decoration:underline}
    /* Handle broken images gracefully */
    img {
      background: #f5f5f5;
      min-width: 50px;
      min-height: 50px;
    }
    img[src=""], img:not([src]), img[src^="http"]:not([src*="images.unsplash"]):not([src*="randomuser"]) {
      background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    img[src^="http"]:not([src*="images.unsplash"]):not([src*="randomuser"])::after {
      content: "📷";
      position: absolute;
      font-size: 20px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top"><i class="fas fa-key"></i><h2>Reset Password</h2><p id="top-sub">Enter your email to receive a reset link</p></div>
    <div class="body">
      <div class="msg" id="msg"></div>
      <div id="request-form"><p style="color:#666;margin-bottom:20px;font-size:.92rem">Enter your registered email address and we'll send you a link to reset your password.</p><div class="fg"><label>Email Address</label><div class="iw"><i class="fas fa-envelope"></i><input type="email" id="req-email" placeholder="your@email.com" required autocomplete="email"></div></div><button class="btn" id="req-btn"><i class="fas fa-paper-plane"></i> Send Reset Link</button><div class="back"><a href="customer-login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></div></div>
      <div id="reset-form" style="display:none"><p style="color:#666;margin-bottom:20px;font-size:.92rem">Enter your new password below.</p><div class="fg"><label>New Password</label><div class="iw"><i class="fas fa-lock"></i><input type="password" id="new-pass" placeholder="Create a strong password" required autocomplete="new-password"></div><div class="pw-bar"><div class="pw-fill" id="pw-fill"></div></div><div class="pw-txt" id="pw-txt">Min 8 chars · uppercase · lowercase · number · special char</div></div><div class="fg"><label>Confirm Password</label><div class="iw"><i class="fas fa-lock"></i><input type="password" id="confirm-pass" placeholder="Repeat your new password" required autocomplete="new-password"></div></div><button class="btn" id="reset-btn"><i class="fas fa-check-circle"></i> Set New Password</button><div class="back"><a href="/customer-login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></div></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/reset-password.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/mobile-nav.js"></script>

</body>
</html>

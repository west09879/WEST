<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/">
  <title>Scan to Access</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #FFF9F0 0%, #F9E6D8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,.1);
      max-width: 400px;
    }
    h1 { color: #8B4513; margin-bottom: 20px; }
    .url {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      word-break: break-all;
      font-family: monospace;
      font-size: 14px;
    }
    .warning {
      background: #fff3cd;
      color: #856404;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 14px;
    }
    button {
      background: #C17B4B;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 BeFo Bakers</h1>
    <p>Scan this QR code or use the link below to access the website</p>
    <div class="url" id="urlDisplay">Loading...</div>
    <div class="warning">
      ⚠️ IMPORTANT: Make sure you type <strong>http://</strong> not <strong>https://</strong>
    </div>
    <button onclick="copyUrl()">📋 Copy URL</button>
  </div>

  <script>
    const url = window.location.origin;
    document.getElementById('urlDisplay').textContent = url;
    
    function copyUrl() {
      navigator.clipboard.writeText(url);
      alert('URL copied! Paste in your browser.');
    }
  </script>
</body>
</html>

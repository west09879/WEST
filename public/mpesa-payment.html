<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Pesa Payment - BeFo Bakers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <base href="/">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .payment-container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .payment-header {
      background: linear-gradient(135deg, #00a900 0%, #008000 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .payment-header i {
      font-size: 60px;
      margin-bottom: 10px;
    }

    .payment-header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .payment-header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .payment-body {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00a900;
    }

    .amount-display {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
    }

    .amount-display .label {
      font-size: 14px;
      color: #666;
    }

    .amount-display .value {
      font-size: 32px;
      font-weight: bold;
      color: #00a900;
    }

    .pay-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #00a900 0%, #008000 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .pay-btn:hover {
      transform: translateY(-2px);
    }

    .pay-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .order-summary {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .order-summary h3 {
      margin-bottom: 10px;
      color: #333;
    }

    .order-summary p {
      margin: 5px 0;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="payment-container">
    <div class="payment-header">
      <i class="fas fa-mobile-alt"></i>
      <h1>Lipa Na M-Pesa</h1>
      <p>Pay securely using M-Pesa</p>
    </div>

    <div class="payment-body">
      <div class="order-summary" id="orderSummary">
        <h3>Order Summary</h3>
        <p><strong>Order #:</strong> <span id="orderNumber">Loading...</span></p>
        <p><strong>Total Amount:</strong> <span id="orderTotal">KSh 0</span></p>
      </div>

      <div class="amount-display">
        <div class="label">Amount to Pay</div>
        <div class="value" id="amountDisplay">KSh 0</div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">M-Pesa Phone Number</label>
        <input type="tel" id="phoneNumber" placeholder="0712345678" value="254708374149">
        <small style="color: #666; display: block; margin-top: 5px;">Format: 0712345678 or 254712345678</small>
      </div>

      <button class="pay-btn" id="payBtn">
        <i class="fas fa-money-bill-wave"></i> Pay Now
      </button>

      <div class="status" id="status"></div>

      <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #999;">
        <i class="fas fa-lock"></i> Secure payment powered by Safaricom
      </p>
    </div>
  </div>

  <script>
    // Get order details from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');
    const amount = urlParams.get('amount');

    // Display order summary
    const orderNumberSpan = document.getElementById('orderNumber');
    const orderTotalSpan = document.getElementById('orderTotal');
    const amountDisplay = document.getElementById('amountDisplay');

    if (orderId) {
      orderNumberSpan.textContent = orderId;
    } else {
      orderNumberSpan.textContent = 'New Order';
    }

    if (amount) {
      orderTotalSpan.textContent = `KSh ${parseInt(amount).toLocaleString()}`;
      amountDisplay.textContent = `KSh ${parseInt(amount).toLocaleString()}`;
    }

    // Format phone number
    function formatPhoneNumber(phone) {
      let cleaned = phone.replace(/\D/g, '');
      if (cleaned.startsWith('0')) {
        cleaned = '254' + cleaned.substring(1);
      } else if (cleaned.startsWith('254')) {
        // Already correct
      } else if (cleaned.length === 9) {
        cleaned = '254' + cleaned;
      }
      return cleaned;
    }

    // Show status message
    function showStatus(message, type) {
      const statusDiv = document.getElementById('status');
      statusDiv.className = `status ${type}`;
      statusDiv.innerHTML = message;
    }

    // Initiate payment
    async function initiatePayment() {
      const phoneInput = document.getElementById('phoneNumber');
      const payBtn = document.getElementById('payBtn');
      let phone = phoneInput.value.trim();

      if (!phone) {
        showStatus('Please enter your M-Pesa phone number', 'error');
        return;
      }

      const formattedPhone = formatPhoneNumber(phone);
      const paymentAmount = amount || document.getElementById('amountDisplay').innerText.replace('KSh ', '').replace(/,/g, '');

      // Disable button and show loading
      payBtn.disabled = true;
      payBtn.innerHTML = '<span class="loading"></span> Processing...';
      showStatus('Initiating payment... Please check your phone for the M-Pesa prompt.', 'info');

      try {
        const response = await fetch('/mpesa/stk-push', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            phoneNumber: formattedPhone,
            amount: parseFloat(paymentAmount),
            orderId: orderId || null,
            accountReference: `Order${orderId || Date.now()}`
          })
        });

        const data = await response.json();

        if (data.success) {
          showStatus(
            `<i class="fas fa-check-circle"></i> ${data.message}<br><br>
             <strong>Checkout Request ID:</strong> ${data.data.checkoutRequestId}<br>
             Please enter your M-Pesa PIN to complete the payment.`,
            'success'
          );

          // Start polling for payment status
          pollPaymentStatus(data.data.checkoutRequestId);
        } else {
          showStatus(`<i class="fas fa-exclamation-triangle"></i> ${data.error || 'Payment failed. Please try again.'}`, 'error');
          payBtn.disabled = false;
          payBtn.innerHTML = '<i class="fas fa-money-bill-wave"></i> Pay Now';
        }
      } catch (error) {
        console.error('Payment error:', error);
        showStatus('<i class="fas fa-exclamation-triangle"></i> Network error. Please try again.', 'error');
        payBtn.disabled = false;
        payBtn.innerHTML = '<i class="fas fa-money-bill-wave"></i> Pay Now';
      }
    }

    // Poll payment status
    async function pollPaymentStatus(checkoutRequestId) {
      let attempts = 0;
      const maxAttempts = 30; // 30 seconds max

      const interval = setInterval(async () => {
        attempts++;

        try {
          const response = await fetch(`/mpesa/status/${checkoutRequestId}`);
          const data = await response.json();

          if (data.success && data.data) {
            if (data.data.status === 'completed') {
              clearInterval(interval);
              showStatus(
                `<i class="fas fa-check-circle"></i> Payment successful!<br><br>
                 <strong>Receipt Number:</strong> ${data.data.mpesa_receipt || 'N/A'}<br>
                 <strong>Amount Paid:</strong> KSh ${data.data.amount}<br><br>
                 Redirecting to order confirmation...`,
                'success'
              );

              // Redirect to order confirmation page
              setTimeout(() => {
                if (orderId) {
                  window.location.href = `/customer-dashboard.html?order=${orderId}`;
                } else {
                  window.location.href = `/order-confirmation.html?ref=${checkoutRequestId}`;
                }
              }, 3000);

              const payBtn = document.getElementById('payBtn');
              payBtn.disabled = true;
              payBtn.innerHTML = '<i class="fas fa-check"></i> Payment Complete';

            } else if (data.data.status === 'failed') {
              clearInterval(interval);
              showStatus(
                `<i class="fas fa-exclamation-triangle"></i> Payment failed: ${data.data.result_desc || 'Unknown error'}<br><br>Please try again.`,
                'error'
              );
              const payBtn = document.getElementById('payBtn');
              payBtn.disabled = false;
              payBtn.innerHTML = '<i class="fas fa-money-bill-wave"></i> Pay Now';
            }
          }

          if (attempts >= maxAttempts) {
            clearInterval(interval);
            if (document.getElementById('status').className !== 'status success') {
              showStatus(
                '<i class="fas fa-clock"></i> Payment is being processed. You will receive a confirmation shortly.',
                'info'
              );
              const payBtn = document.getElementById('payBtn');
              payBtn.disabled = false;
              payBtn.innerHTML = '<i class="fas fa-money-bill-wave"></i> Pay Now';
            }
          }
        } catch (error) {
          console.error('Status check error:', error);
        }
      }, 2000);
    }

    // Event listener
    document.getElementById('payBtn').addEventListener('click', initiatePayment);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The Bakehouse - BeFo Bakers Production Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid rgba(212, 175, 55, 0.3);
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #D4AF37, #C17B4B);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon i {
      font-size: 24px;
      color: #1a1a2e;
    }

    .logo-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: white;
    }

    .logo-text span {
      font-size: 11px;
      color: #D4AF37;
    }

    /* Role Selector */
    .role-selector {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 50px;
      padding: 4px;
      display: flex;
      gap: 4px;
    }

    .role-btn {
      padding: 10px 24px;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }

    .role-btn i {
      margin-right: 8px;
    }

    .role-btn.active {
      background: linear-gradient(135deg, #D4AF37, #C17B4B);
      color: #1a1a2e;
    }

    .role-btn:hover:not(.active) {
      background: rgba(212, 175, 55, 0.2);
      color: #D4AF37;
    }

    /* Worker Info */
    .worker-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .worker-badge {
      background: rgba(212, 175, 55, 0.15);
      padding: 8px 16px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .worker-badge i {
      color: #D4AF37;
    }

    .logout-btn {
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.4);
      color: #e74c3c;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .logout-btn:hover {
      background: rgba(231, 76, 60, 0.3);
    }

    /* Main Container */
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Dashboard Header */
    .dashboard-header {
      margin-bottom: 28px;
    }

    .dashboard-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .dashboard-header h2 i {
      color: #D4AF37;
      font-size: 32px;
    }

    .dashboard-header p {
      color: #888;
      font-size: 14px;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(212, 175, 55, 0.15);
      transition: all 0.3s;
    }

    .stat-card:hover {
      border-color: rgba(212, 175, 55, 0.4);
      transform: translateY(-2px);
    }

    .stat-card .icon {
      font-size: 32px;
      color: #D4AF37;
      margin-bottom: 12px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-card .label {
      font-size: 13px;
      color: #888;
    }

    /* Section Header */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .section-header h3 {
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-header h3 i {
      color: #D4AF37;
    }

    .refresh-btn {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: #D4AF37;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .refresh-btn:hover {
      background: rgba(212, 175, 55, 0.2);
    }

    /* Orders Grid */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 24px;
    }

    .order-card {
      background: #16213e;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(212, 175, 55, 0.15);
      transition: all 0.3s;
    }

    .order-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      border-color: rgba(212, 175, 55, 0.4);
    }

    .card-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 20px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-number {
      font-weight: 700;
      font-size: 15px;
      color: #D4AF37;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-pending {
      background: rgba(243, 156, 18, 0.2);
      color: #f39c12;
    }

    .status-in_progress {
      background: rgba(52, 152, 219, 0.2);
      color: #3498db;
    }

    .status-completed {
      background: rgba(46, 204, 113, 0.2);
      color: #2ecc71;
    }

    .card-body {
      padding: 20px;
    }

    .cake-details {
      margin-bottom: 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .detail-label {
      color: #888;
      font-size: 12px;
    }

    .detail-value {
      font-weight: 500;
      font-size: 13px;
      text-align: right;
    }

    .items-list {
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 12px;
      margin: 16px 0;
    }

    .items-list h4 {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .items-list ul {
      list-style: none;
    }

    .items-list li {
      font-size: 12px;
      padding: 4px 0;
      display: flex;
      justify-content: space-between;
    }

    .card-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(212, 175, 55, 0.15);
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #D4AF37, #C17B4B);
      color: #1a1a2e;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
    }

    .btn-success {
      background: rgba(46, 204, 113, 0.2);
      border: 1px solid rgba(46, 204, 113, 0.5);
      color: #2ecc71;
    }

    .btn-success:hover {
      background: rgba(46, 204, 113, 0.3);
    }

    .btn-warning {
      background: rgba(52, 152, 219, 0.2);
      border: 1px solid rgba(52, 152, 219, 0.5);
      color: #3498db;
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      background: #16213e;
      border-radius: 20px;
    }

    .empty-state i {
      font-size: 64px;
      color: rgba(212, 175, 55, 0.3);
      margin-bottom: 16px;
    }

    .empty-state p {
      color: #888;
    }

    .loading {
      text-align: center;
      padding: 60px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-radius: 50%;
      border-top-color: #D4AF37;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: 10px;
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .toast.success {
      background: #2ecc71;
      color: white;
    }

    .toast.error {
      background: #e74c3c;
      color: white;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100%);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        text-align: center;
      }

      .role-selector {
        width: 100%;
        justify-content: center;
      }

      .orders-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-crown"></i>
      </div>
      <div class="logo-text">
        <h1>The Bakehouse</h1>
        <span>BeFo Bakers Production Hub</span>
      </div>
    </div>

    <div class="role-selector" id="roleSelector">
      <button class="role-btn" data-role="baker">
        <i class="fas fa-bread-slice"></i> Baker
      </button>
      <button class="role-btn" data-role="designer">
        <i class="fas fa-palette"></i> Designer
      </button>
      <button class="role-btn" data-role="delivery">
        <i class="fas fa-truck"></i> Delivery
      </button>
    </div>

    <div class="worker-info">
      <div class="worker-badge">
        <i class="fas fa-user-check"></i>
        <span id="workerName">Loading...</span>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Exit
      </button>
    </div>
  </header>

  <div class="container">
    <!-- Dashboard Header -->
    <div class="dashboard-header">
      <h2 id="roleTitle">
        <i class="fas fa-bread-slice"></i>
        Baker's Station
      </h2>
      <p id="roleDescription">Manage cake baking tasks - sponge preparation, baking, and quality check</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="icon"><i class="fas fa-hourglass-half"></i></div>
        <div class="value" id="pendingCount">0</div>
        <div class="label">Pending Tasks</div>
      </div>
      <div class="stat-card">
        <div class="icon"><i class="fas fa-play-circle"></i></div>
        <div class="value" id="inProgressCount">0</div>
        <div class="label">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <div class="value" id="completedCount">0</div>
        <div class="label">Completed Today</div>
      </div>
    </div>

    <!-- Tasks Section -->
    <div class="section-header">
      <h3 id="sectionTitle"><i class="fas fa-list"></i> Active Tasks</h3>
      <button class="refresh-btn" id="refreshBtn">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>

    <div id="tasksContainer">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading tasks...</p>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/production/production.js"></script>
</body>
</html>

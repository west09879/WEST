<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Worker Orders — WEST</title>
    <style>
        body {
            font-family: system-ui, Segoe UI, Roboto, sans-serif;
            padding: 1rem
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th,
        td {
            padding: .5rem;
            border: 1px solid #ddd
        }

        .badge {
            padding: .2rem .4rem;
            border-radius: 4px;
            background: #eee
        }

        .controls button {
            margin-right: .3rem
        }
    </style>
</head>

<body>
    <h1>Worker Orders Dashboard</h1>
    <div>
        <label>Worker token: <input id="token" placeholder="paste token or leave blank for default"
                style="width:400px" /></label>
        <label>Worker name: <input id="workerName" placeholder="Your name" /></label>
        <button id="btnLoad">Load Orders</button>
    </div>
    <hr />
    <table id="ordersTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Assigned</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="/worker/worker.js"></script>
</body>

</html>

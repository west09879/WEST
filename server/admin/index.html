<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>WEST Admin</title>
  <style>
    body {
      font-family: system-ui, Segoe UI, Roboto, sans-serif;
      padding: 1rem
    }

    input,
    button {
      padding: .5rem;
      margin: .25rem
    }
  </style>
</head>

<body>
  <h1>WEST — Admin</h1>
  <section id="login">
    <h2>Login</h2>
    <input id="user" placeholder="username" value="admin" />
    <input id="pass" placeholder="password" type="password" value="password" />
    <button id="btnLogin">Login</button>
    <div id="loginError" style="color:red"></div>
  </section>

  <section id="panel" style="display:none">
    <h2>Gallery</h2>
    <div>
      <input id="gTitle" placeholder="Title" />
      <input id="gImage" placeholder="Image URL" />
      <input id="gDesc" placeholder="Description" />
      <button id="addGallery">Add</button>
    </div>
    <ul id="galleryList"></ul>

    <h2>Orders</h2>
    <ul id="ordersList"></ul>

    <h2>Admins / Users</h2>
    <div>
      <input id="newUserName" placeholder="username" />
      <input id="newUserPass" placeholder="password" type="password" />
      <button id="addUser">Add Admin</button>
    </div>
    <table id="adminsTable" border="1" style="width:100%;margin-top:.5rem">
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="/admin/admin.js"></script>
</body>

</html>
